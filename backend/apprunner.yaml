version: 1.0

runtime: python311

build:
  commands:
    build:
      - pip install -r requirements.txt
      - python manage.py collectstatic --noinput

run:
  runtime-version: 3.11.9
  command: gunicorn config.wsgi:application --bind 0.0.0.0:8080 --workers 1 --threads 2 --timeout 120
  network:
    port: 8080
  env:
    - name: DEBUG
      value: "False"
    - name: ALLOWED_HOSTS
      value: "localhost"
    - name: CSRF_TRUSTED_ORIGINS
      value: "https://localhost"