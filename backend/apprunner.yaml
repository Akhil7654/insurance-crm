version: 1.0
runtime: python3.10

build:
  commands:
    - pip3 install -r requirements.txt
    - python3 manage.py collectstatic --noinput

run:
  command: >
    python3 manage.py migrate --noinput &&
    gunicorn config.wsgi:application --bind 0.0.0.0:8090 --workers 1 --threads 2 --timeout 120
  port: 8090

health_check:
  path: /
  protocol: HTTP
  interval: 10
  timeout: 5
  healthy_threshold: 1
  unhealthy_threshold: 5

