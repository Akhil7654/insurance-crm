version: 1.0
runtime: python311
build:
  commands:
    build:
      - pip3 install -r requirements.txt --target /app/backend/packages
      - PYTHONPATH=/app/backend/packages python3 manage.py collectstatic --noinput
run:
  commands:
    - PYTHONPATH=/app/backend/packages python3 manage.py migrate
    - PYTHONPATH=/app/backend/packages python3 -m gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 120
  network:
    port: 8080
  env:
    - name: PYTHONPATH
      value: /app/backend/packages