version: 1.0
runtime: python311
build:
  commands:
    build:
      - pip3 install -r requirements.txt --target /app/backend/packages
      - PYTHONPATH=/app/backend/packages python3 manage.py collectstatic --noinput
      - chmod +x start.sh
run:
  command: ./start.sh
  network:
    port: 8080
  env:
    - name: PYTHONPATH
      value: /app/backend/packages